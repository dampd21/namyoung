name: Marketing Tracker

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'
        id: setup-chrome

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install selenium webdriver-manager requests
          pip list | grep -i selenium
          pip list | grep -i requests

      - name: Verify installations
        run: |
          python -c "import selenium; print('selenium:', selenium.__version__)"
          python -c "import requests; print('requests:', requests.__version__)"
          echo "Chrome: ${{ steps.setup-chrome.outputs.chrome-path }}"
          which chromedriver || echo "chromedriver not in PATH"

      - name: Run marketing tracker
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET_KEY: ${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
        run: |
          python scripts/naver_place_tracker.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/marketing_data.json docs/marketing_config.json
          git diff --staged --quiet || git commit -m "Update marketing data $(date +'%Y-%m-%d %H:%M')"
          git push
